name: Refresh dashboard data (GSC)
on:
  schedule:
    - cron: "17 6,16 * * *"   # twice daily
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install google-auth requests
      - name: Pull Google Search Console
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
        run: python3 pull_gsc.py
      - name: Commit if changed
        run: |
          git config user.name "jetterix-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git commit -m "data refresh" || echo "no changes"
          git push || echo "nothing to push"
